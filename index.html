<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envelope Budget App</title>
<style>
body { font-family: Arial; margin:0; background:#f7f7f7; }
header { text-align:center; padding:1rem; background:#4CAF50; color:white; }
.container { padding:15px; }
input, button { width:100%; padding:12px; margin:6px 0; font-size:1rem; }
.envelope { background:white; padding:15px; border-radius:10px; margin:8px 0; cursor:pointer; box-shadow:0 3px 6px rgba(0,0,0,0.1);}
.negative { color:red; }
#app { display:none; }

/* MODAL */
#modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
#modalContent { background:white; padding:20px; border-radius:10px; width:90%; max-width:400px; }
#modalContent input { width:100%; margin:5px 0; padding:8px; }
#history { max-height:200px; overflow-y:auto; margin-top:10px; border-top:1px solid #ddd; padding-top:10px; }
#modalContent button { margin:5px 0; padding:10px; width:100%; font-size:1rem; }
</style>
</head>
<body>
<header>Envelope Budget App</header>

<!-- LOGIN -->
<div class="container" id="auth">
<h3>Login / Sign Up</h3>
<input id="emailInput" placeholder="Email">
<input id="passwordInput" type="password" placeholder="Password">
<button id="signupBtn">Sign Up</button>
<button id="loginBtn">Login</button>
<p id="authError" style="color:red;"></p>
</div>

<!-- APP -->
<div class="container" id="app">
<button id="logoutBtn">Logout</button>
<h3 id="total">$0.00 Total</h3>
<div id="envelopes"></div>
<button id="addEnvelopeBtn">+ Add Envelope</button>
</div>

<!-- MODAL -->
<div id="modal">
<div id="modalContent">
<h4>Balance: $<span id="modalBalance">0</span></h4>
<input id="amountInput" placeholder="Amount" type="number">
<input id="noteInput" placeholder="Optional Note">
<button id="addMoneyBtn">Add Money</button>
<button id="spendMoneyBtn">Spend Money</button>
<div id="history"></div>
<button id="closeModalBtn">Close</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
apiKey: "AIzaSyCkQ6YSSkvgPVEzHQz-UPeyJRiFqDX18Ug",
authDomain: "budget-app-51260.firebaseapp.com",
databaseURL: "https://budget-app-51260-default-rtdb.firebaseio.com",
projectId: "budget-app-51260",
storageBucket: "budget-app-51260.firebasestorage.app",
messagingSenderId: "378506546234",
appId: "1:378506546234:web:aa8c4be92bc5c736a8f903"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;
let currentEnvelopeId = null;
let envelopeSpans = {};

document.addEventListener("DOMContentLoaded", () => {
const emailInput = document.getElementById("emailInput");
const passwordInput = document.getElementById("passwordInput");
const authError = document.getElementById("authError");
const signupBtn = document.getElementById("signupBtn");
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const addEnvelopeBtn = document.getElementById("addEnvelopeBtn");

const modal = document.getElementById("modal");
const modalBalance = document.getElementById("modalBalance");
const amountInput = document.getElementById("amountInput");
const noteInput = document.getElementById("noteInput");
const historyDiv = document.getElementById("history");
const addMoneyBtn = document.getElementById("addMoneyBtn");
const spendMoneyBtn = document.getElementById("spendMoneyBtn");
const closeModalBtn = document.getElementById("closeModalBtn");

// AUTH
signupBtn.addEventListener("click", async () => {
try {
await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
authError.innerText = "";
} catch(err){
authError.innerText = err.message;
}
});

loginBtn.addEventListener("click", async () => {
try {
await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
authError.innerText = "";
} catch(err){
authError.innerText = err.message;
}
});

logoutBtn.addEventListener("click", async () => { await signOut(auth); });

onAuthStateChanged(auth, (user) => {
if(user){
userId = user.uid;
document.getElementById("auth").style.display = "none";
document.getElementById("app").style.display = "block";
renderEnvelopes();
} else {
document.getElementById("auth").style.display = "block";
document.getElementById("app").style.display = "none";
}
});

// ADD ENVELOPE
addEnvelopeBtn.addEventListener("click", async () => {
const name = prompt("Envelope name?");
if(!name) return;
const envelopesRef = collection(db, "users", userId, "envelopes");
try {
await addDoc(envelopesRef, { name, balance: 0, history: [] });
} catch(err) {
alert("Error adding envelope: " + err.message);
}
});

// RENDER ENVELOPES
async function renderEnvelopes() {
const envelopesRef = collection(db, "users", userId, "envelopes");
onSnapshot(envelopesRef, snapshot => {
const container = document.getElementById("envelopes");
container.innerHTML = "";
envelopeSpans = {};
let total = 0;
snapshot.forEach(docSnap => {
const env = docSnap.data();
total += env.balance;

const div = document.createElement("div");
div.className = "envelope";

const balanceSpan = document.createElement("span");
balanceSpan.className = env.balance < 0 ? "negative" : "";
balanceSpan.innerText = `$${env.balance.toFixed(2)}`;

div.innerHTML = `<b>${env.name}</b><br>`;
div.appendChild(balanceSpan);

envelopeSpans[docSnap.id] = balanceSpan;

div.onclick = () => openModal(docSnap.id);
container.appendChild(div);
});
document.getElementById("total").innerText = "$" + total.toFixed(2) + " Total";
});
}

// OPEN MODAL WITH FRESH DATA
async function openModal(id) {
currentEnvelopeId = id;
const envRef = doc(db, "users", userId, "envelopes", id);
const envSnap = await getDoc(envRef);
if (!envSnap.exists()) return;

const env = envSnap.data();
modal.style.display = "flex";
modalBalance.innerText = env.balance.toFixed(2);
amountInput.value = "";
noteInput.value = "";
renderHistory(env.history || []);
}

function closeModal() { modal.style.display = "none"; }
closeModalBtn.addEventListener("click", closeModal);

function renderHistory(history) {
if(!history || history.length===0){
historyDiv.innerHTML="<p>No transactions yet.</p>";
return;
}
historyDiv.innerHTML = history.slice().reverse().map(h => `<p>${h.date} - ${h.type} $${h.amount.toFixed(2)} ${h.note?'- '+h.note:''} (Balance: $${h.balance.toFixed(2)})</p>`).join('');
}

addMoneyBtn.addEventListener("click", () => changeBalance(true));
spendMoneyBtn.addEventListener("click", () => changeBalance(false));

async function changeBalance(isAdd){
const amount = parseFloat(amountInput.value);
if(isNaN(amount) || amount <= 0){ alert("Enter valid amount"); return; }
const note = noteInput.value;

// Update modal
const modalCurrent = parseFloat(modalBalance.innerText);
const newBalance = isAdd ? modalCurrent + amount : modalCurrent - amount;
modalBalance.innerText = newBalance.toFixed(2);

// Update history
const newEntry = {
type: isAdd ? "+" : "-",
amount,
note,
date: new Date().toLocaleDateString(),
balance: newBalance
};
const p = document.createElement('p');
p.innerHTML = `${newEntry.date} - ${newEntry.type} $${newEntry.amount.toFixed(2)}${note ? ' - '+note : ''} (Balance: $${newEntry.balance.toFixed(2)})`;
historyDiv.prepend(p);

// Update envelope button instantly
if(envelopeSpans[currentEnvelopeId]){
envelopeSpans[currentEnvelopeId].innerText = `$${newBalance.toFixed(2)}`;
envelopeSpans[currentEnvelopeId].className = newBalance < 0 ? "negative" : "";
}

// Save to Firestore
const envRef = doc(db,"users",userId,"envelopes",currentEnvelopeId);
const envSnap = await getDoc(envRef);
let envData = envSnap.exists()? envSnap.data() : {balance:0,history:[]};
envData.balance = newBalance;
envData.history.push(newEntry);
await setDoc(envRef, envData);
}

});
</script>
</body>
</html>
